<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Gravitas+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./index.css">
    <title>Simon Says</title>
</head>

<body>
    <div class="container py-5">
        <h1 class="text-center mb-4 display-5 fw-bold text-danger-emphasis">Simon Says - Gioco di Memoria</h1>
        <!-- Card per visualizzare i numeri da memorizzare -->
        <div class="card mb-4 rounded-4 shadow-lg overflow-hidden">
            <div class="card-header bg-primary text-white py-3">
                <h2 class="h5 mb-0">Memorizza i seguenti numeri entro il tempo limite!</h2>
            </div>
            <div class="card-body p-4">
                <button id="start-btn" class="btn btn-success btn-lg rounded-pill px-4">Avvia Gioco</button>
                <div id="numbers-display" class="numbers-display mt-3 rounded-3"></div>
            </div>
        </div>
        <!-- Card per inserire i numeri memorizzati -->
        <div class="card rounded-4 shadow-lg overflow-hidden">
            <div class="card-header bg-success text-white py-3">
                <h2 class="h5 mb-0">Inserisci i numeri che ti ricordi</h2>
            </div>
            <div class="card-body p-4">
                <div class="row row-cols-2 row-cols-sm-5 g-3">
                    <div class="col">
                        <input type="number" class="form-control form-control-lg text-center fs-3 rounded-3" min="1"
                            max="99" placeholder="1">
                    </div>
                    <div class="col">
                        <input type="number" class="form-control form-control-lg text-center fs-3 rounded-3" min="1"
                            max="99" placeholder="2">
                    </div>
                    <div class="col">
                        <input type="number" class="form-control form-control-lg text-center fs-3 rounded-3" min="1"
                            max="99" placeholder="3">
                    </div>
                    <div class="col">
                        <input type="number" class="form-control form-control-lg text-center fs-3 rounded-3" min="1"
                            max="99" placeholder="4">
                    </div>
                    <div class="col">
                        <input type="number" class="form-control form-control-lg text-center fs-3 rounded-3" min="1"
                            max="99" placeholder="5">
                    </div>
                </div>
                <button id="check-btn" class="btn btn-warning btn-lg mt-4 rounded-pill px-4">Controlla!</button>
                <div id="result" class="mt-3 text-center fs-5 fw-semibold"></div>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./script.js"></script>
</body>

</html>
